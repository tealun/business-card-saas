<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<body>
<x-dc>
<helmet>
<style>
  @keyframes glowPulse { 0%,100%{ opacity:.5; transform:scale(1);} 50%{ opacity:.8; transform:scale(1.06);} }
  @keyframes meshDrift { 0%,100%{ transform: translate(0,0);} 50%{ transform: translate(-10px,-8px);} }
  @keyframes dotBreathe { 0%,100%{ opacity:.35; r:2.6;} 50%{ opacity:.9; r:4;} }
  @keyframes lineFlow { to { stroke-dashoffset: -20; } }
  @keyframes floatCloud { 0%,100%{ transform: translateY(0px);} 50%{ transform: translateY(6px);} }
  @keyframes floatCard { 0%,100%{ transform: translateY(0px);} 50%{ transform: translateY(-8px);} }
  @keyframes floatPlane { 0%,100%{ transform: translateY(0px);} 50%{ transform: translateY(-10px);} }
  @keyframes floatPeople { 0%,100%{ transform: translateY(0px);} 50%{ transform: translateY(-5px);} }
  @keyframes floatChart { 0%,100%{ transform: translateY(0px);} 50%{ transform: translateY(-7px);} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes fadeUp { from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:translateY(0);} }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif; }
  a { color:#4A5AC2; text-decoration:none; }
  a:hover { color:#38449C; text-decoration:underline; }
  ::placeholder { color:#9AA1AF; }
</style>
</helmet>

<div style="display:flex;height:100vh;width:100%;overflow:hidden;background:#0A0F2C;">

    <div style="position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:44px 56px;box-sizing:border-box;">

        <img src="uploads/color-nobg.png" style="width:28px;height:28px;object-fit:contain;" alt="logo"/>

      </div>

      <div style="position:relative;flex:1;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(91,107,216,0.3),transparent 70%);filter:blur(4px);animation:glowPulse 8s ease-in-out infinite;"></div>

        <svg width="460" height="380" viewBox="0 0 480 380" style="position:relative;overflow:visible;">
          <defs>
            <filter id="heroShadow" x="-60%" y="-60%" width="220%" height="220%">
              <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#050A24" flood-opacity="0.55"/>
            </filter>
            <filter id="softShadow" x="-80%" y="-80%" width="260%" height="260%">
              <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#050A24" flood-opacity="0.4"/>
            </filter>
            <radialGradient id="cloudA" cx="35%" cy="30%" r="75%"><stop offset="0%" stop-color="#F1F5FE"/><stop offset="100%" stop-color="#E4EBFC"/></radialGradient>
            <radialGradient id="cloudB" cx="35%" cy="30%" r="75%"><stop offset="0%" stop-color="#E4EBFC"/><stop offset="100%" stop-color="#C7D3F5"/></radialGradient>
            <radialGradient id="cloudC" cx="32%" cy="28%" r="80%"><stop offset="0%" stop-color="#DBE4FA"/><stop offset="100%" stop-color="#B6C5EF"/></radialGradient>
            <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F3F5FD"/></linearGradient>
            <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6675DE"/><stop offset="100%" stop-color="#3D4CAE"/></linearGradient>
            <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#DCE3F8"/><stop offset="100%" stop-color="#C3CEF3"/></linearGradient>
            <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#AABBEF"/><stop offset="100%" stop-color="#8A9DE6"/></linearGradient>
            <linearGradient id="barGrad3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#6675DE"/><stop offset="100%" stop-color="#414FB2"/></linearGradient>
            <linearGradient id="personGradWhite" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#E4EAFB"/></linearGradient>
            <linearGradient id="personGradBlue" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#EEF1FC"/><stop offset="100%" stop-color="#CBD6F5"/></linearGradient>
          </defs>

          <ellipse cx="240" cy="352" rx="175" ry="16" fill="#040814" opacity="0.4" style="filter:blur(6px);"/>

          <g style="animation:floatCloud 9s ease-in-out infinite;">
            <circle cx="240" cy="140" r="38" fill="url(#cloudA)"/>
            <circle cx="185" cy="185" r="46" fill="url(#cloudB)"/>
            <circle cx="295" cy="185" r="50" fill="url(#cloudB)"/>

          </g>

            <rect x="145" y="120" width="190" height="120" rx="18" fill="url(#cardGrad)" transform="rotate(-6 240 180)"/>

            <circle cx="365" cy="90" r="4.5" fill="#22C55E"/>
            <path d="M400,48 L446,68 L418,74 Z" fill="#FFFFFF"/>
            <path d="M418,74 L425,88 L446,68 Z" fill="#DCE3F8"/>
          </g>

          <g style="transform-box:fill-box;transform-origin:center;animation:floatPeople 8s ease-in-out infinite;">

            <circle cx="120" cy="255" r="4.5" fill="#22C55E"/>
            <ellipse cx="55" cy="330" rx="17" ry="5" fill="#B9C7F1"/>
            <ellipse cx="98" cy="336" rx="17" ry="5" fill="#B9C7F1"/>
            <g filter="url(#softShadow)">
              <rect x="43" y="300" width="24" height="30" rx="12" fill="url(#personGradWhite)"/>
              <circle cx="55" cy="291" r="12" fill="url(#personGradWhite)"/>
              <rect x="83" y="294" width="27" height="33" rx="13.5" fill="url(#personGradBlue)"/>
              <circle cx="97" cy="283" r="13" fill="url(#personGradBlue)"/>
            </g>

          <g style="transform-box:fill-box;transform-origin:center;animation:floatChart 7.5s ease-in-out infinite;" filter="url(#softShadow)">

            <circle cx="340" cy="255" r="4.5" fill="#22C55E"/>
            <rect x="365" y="308" width="86" height="11" rx="5.5" fill="#C3CEF3"/>
            <rect x="377" y="282" width="15" height="34" rx="4" fill="url(#barGrad1)"/>
            <rect x="397" y="260" width="15" height="56" rx="4" fill="url(#barGrad2)"/>

        </svg>
      </div>

      <div>
        <div style="font-size:25px;font-weight:600;color:#fff;line-height:1.5;max-width:460px;letter-spacing:.2px;">连接企业与客户的<br/>智能数字名片云平台</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.45);margin-top:12px;letter-spacing:.3px;">授权同步　·　数据洞察　·　企业级安全</div>

  <div style="flex:1;background:#F6F7F9;display:flex;align-items:center;justify-content:center;">
    <div style="width:380px;animation:fadeUp .5s ease both;">
      <div style="font-size:24px;font-weight:700;color:#111827;margin-bottom:6px;">欢迎回来</div>
      <div style="font-size:13px;color:#667085;margin-bottom:28px;">登录以继续管理您的企业数字名片</div>

      <div style="display:flex;background:#F1F2F4;border-radius:8px;padding:3px;margin-bottom:22px;">
        <div style="{{ roleTabs.tenant.style }}" onClick="{{ roleTabs.tenant.onClick }}">企业管理员</div>
        <div style="{{ roleTabs.platform.style }}" onClick="{{ roleTabs.platform.onClick }}">系统管理员</div>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <div style="font-size:12px;color:#667085;margin-bottom:6px;">{{ accountLabel }}</div>
          <input value="{{ account }}" onChange="{{ onAccountChange }}" placeholder="{{ accountPlaceholder }}" style="width:100%;box-sizing:border-box;border:1px solid {{ accountBorder }};border-radius:8px;padding:11px 12px;font-size:14px;outline:none;background:#fff;"/>
        </div>
        <div>
          <div style="font-size:12px;color:#667085;margin-bottom:6px;">密码</div>
          <div style="position:relative;">
            <input type="{{ pwdInputType }}" value="{{ password }}" onChange="{{ onPasswordChange }}" placeholder="请输入密码" style="width:100%;box-sizing:border-box;border:1px solid {{ passwordBorder }};border-radius:8px;padding:11px 40px 11px 12px;font-size:14px;outline:none;background:#fff;"/>
            <div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#9AA1AF;" onClick="{{ togglePwdVisible }}">
              <sc-if value="{{ pwdVisible }}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </sc-if>
              <sc-if value="{{ pwdHidden }}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a21.6 21.6 0 015.06-6.06M9.9 4.24A10.4 10.4 0 0112 4c7 0 11 8 11 8a21.6 21.6 0 01-2.49 3.61"/><path d="M14.12 14.12a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </sc-if>
            </div>
          </div>
        </div>
        <sc-if value="{{ hasError }}"><div style="font-size:12px;color:#DC2626;">{{ errorText }}</div></sc-if>

        <div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;">
          <div style="display:flex;align-items:center;gap:6px;cursor:pointer;color:#667085;white-space:nowrap;flex:none;" onClick="{{ toggleRemember }}">
            <div style="{{ rememberBoxStyle }}"><sc-if value="{{ remember }}">✓</sc-if></div>
            记住我
          </div>
          <a href="#">忘记密码？</a>
        </div>

        <button style="{{ submitStyle }}" onClick="{{ onSubmit }}" disabled="{{ loading }}">
          <sc-if value="{{ loading }}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" style="animation:spin 1s linear infinite;margin-right:8px;vertical-align:-3px;"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 3v6h-6"/></svg></sc-if>
          {{ submitLabel }}
        </button>
      </div>

      <div style="text-align:center;font-size:12px;color:#9AA1AF;margin-top:32px;">© 2026 智云名片 · 企业级安全登录</div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    role: 'tenant',
    account: '',
    password: '',
    pwdVisible: false,
    remember: true,
    loading: false,
    error: ''
  };

  setRole(r) { this.setState({ role: r, account: '', error: '' }); }
  onAccountChange(e) { this.setState({ account: e.target.value, error: '' }); }
  onPasswordChange(e) { this.setState({ password: e.target.value, error: '' }); }
  togglePwdVisible() { this.setState({ pwdVisible: !this.state.pwdVisible }); }
  toggleRemember() { this.setState({ remember: !this.state.remember }); }
  submit() {
    if (!this.state.account.trim() || !this.state.password.trim()) {
      this.setState({ error: '请输入账号和密码' }); return;
    }
    this.setState({ loading: true, error: '' });
    setTimeout(() => this.setState({ loading: false, error: '账号或密码不正确（原型演示）' }), 1200);
  }

  renderVals() {
    const s = this.state;
    const tabStyle = (active) => 'flex:1;text-align:center;padding:8px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;' +
      (active ? 'background:#fff;color:#111827;box-shadow:0 1px 3px rgba(17,24,39,0.1);' : 'color:#667085;');

    return {
      roleTabs: {
        tenant: { style: tabStyle(s.role==='tenant'), onClick: () => this.setRole('tenant') },
        platform: { style: tabStyle(s.role==='platform'), onClick: () => this.setRole('platform') }
      },
      accountLabel: s.role==='platform' ? '平台账号' : '企业管理员账号',
      accountPlaceholder: s.role==='platform' ? '请输入平台账号' : '请输入手机号/邮箱',
      account: s.account, onAccountChange: (e) => this.onAccountChange(e),
      accountBorder: s.error ? '#DC2626' : '#E5E7EB',
      password: s.password, onPasswordChange: (e) => this.onPasswordChange(e),
      passwordBorder: s.error ? '#DC2626' : '#E5E7EB',
      pwdInputType: s.pwdVisible ? 'text' : 'password',
      pwdVisible: s.pwdVisible, pwdHidden: !s.pwdVisible,
      togglePwdVisible: () => this.togglePwdVisible(),
      hasError: !!s.error, errorText: s.error,
      remember: s.remember, toggleRemember: () => this.toggleRemember(),
      rememberBoxStyle: 'width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;border:1px solid ' + (s.remember ? '#4A5AC2' : '#D8DBE2') + ';background:' + (s.remember ? '#4A5AC2' : '#fff') + ';',
      loading: s.loading,
      submitLabel: s.loading ? '登录中…' : '登录',
      submitStyle: 'width:100%;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-top:4px;background:linear-gradient(135deg,#5B6BD8,#4A5AC2);box-shadow:0 8px 20px rgba(74,90,194,0.35);',
      onSubmit: () => this.submit()
    };
  }
}
</script>
</body>
</html>
