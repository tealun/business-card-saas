# Backend deployment workflow.
#
# Required GitHub repository secrets:
# - DEPLOY_HOST or SSH_HOST: server hostname or IP
# - DEPLOY_USER or SSH_USER: SSH user with write access to the backend deploy path
# - DEPLOY_PORT or SSH_PORT: SSH port, optional; defaults to 22
# - BACKEND_DEPLOY_PATH or DEPLOY_PATH: absolute server directory for backend files
# - DEPLOY_SSH_KEY or SSH_PRIVATE_KEY or SSH_KEY: optional private key for key-based auth
# - DEPLOY_PASSWORD or SSH_PASSWORD: optional password fallback when no key is configured
# - DEPLOY_RESTART_COMMAND: optional server-side restart script
# - BACKEND_PUBLIC_ORIGIN and ADMIN_PUBLIC_ORIGIN: optional public URLs for post-deploy CORS preflight verification
#
# Auth selection:
# - If DEPLOY_SSH_KEY/SSH_PRIVATE_KEY/SSH_KEY is present, rsync uses that key.
# - Otherwise, rsync uses sshpass with DEPLOY_PASSWORD/SSH_PASSWORD.
# - The workflow fails if neither key nor password is configured.
#
# Server files protected from deletion/overwrite:
# node_modules, dist, real runtime env files such as .env/.env.production,
# logs, certs, uploads, data/cache/storage/tmp/runtime files.
# backend/.env.example is intentionally deployed to the target root as an operator template.

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "database/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

env:
  NODE_VERSION: "24"

jobs:
  deploy:
    name: Verify and deploy backend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            ./backend/package-lock.json
            ./database/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install database dependencies
        working-directory: ./database
        run: npm ci

      - name: Verify backend
        working-directory: ./backend
        run: |
          npm audit --omit=dev --audit-level=moderate
          npm run typecheck
          npm run lint
          npm test -- --coverage --coverageThreshold='{}'
          npm run build

      - name: Verify database assets
        working-directory: ./database
        run: npm run rls:validate

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      - name: Resolve deployment credentials
        env:
          DEPLOY_HOST_SECRET: ${{ secrets.DEPLOY_HOST }}
          SSH_HOST_SECRET: ${{ secrets.SSH_HOST }}
          DEPLOY_PORT_SECRET: ${{ secrets.DEPLOY_PORT }}
          SSH_PORT_SECRET: ${{ secrets.SSH_PORT }}
          DEPLOY_USER_SECRET: ${{ secrets.DEPLOY_USER }}
          SSH_USER_SECRET: ${{ secrets.SSH_USER }}
          BACKEND_DEPLOY_PATH_SECRET: ${{ secrets.BACKEND_DEPLOY_PATH }}
          DEPLOY_PATH_SECRET: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY_SECRET: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PRIVATE_KEY_SECRET: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KEY_SECRET: ${{ secrets.SSH_KEY }}
          DEPLOY_PASSWORD_SECRET: ${{ secrets.DEPLOY_PASSWORD }}
          SSH_PASSWORD_SECRET: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail

          host="${DEPLOY_HOST_SECRET:-${SSH_HOST_SECRET:-}}"
          port="${DEPLOY_PORT_SECRET:-${SSH_PORT_SECRET:-22}}"
          user="${DEPLOY_USER_SECRET:-${SSH_USER_SECRET:-}}"
          path="${BACKEND_DEPLOY_PATH_SECRET:-${DEPLOY_PATH_SECRET:-}}"

          test -n "$host"
          test -n "$user"
          test -n "$path"

          case "$path" in
            /*) ;;
            *)
              echo "BACKEND_DEPLOY_PATH/DEPLOY_PATH must be an absolute server path" >&2
              exit 1
              ;;
          esac

          case "$path" in
            *"'"*|*[[:space:]]*)
              echo "BACKEND_DEPLOY_PATH/DEPLOY_PATH must not contain quotes or whitespace" >&2
              exit 1
              ;;
          esac

          {
            echo "DEPLOY_HOST=$host"
            echo "DEPLOY_PORT=$port"
            echo "DEPLOY_USER=$user"
            echo "DEPLOY_PATH=$path"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$port" "$host" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

          ssh_key="${DEPLOY_SSH_KEY_SECRET:-${SSH_PRIVATE_KEY_SECRET:-${SSH_KEY_SECRET:-}}}"

          if [ -n "$ssh_key" ]; then
            printf '%s\n' "$ssh_key" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            echo "DEPLOY_AUTH_MODE=key" >> "$GITHUB_ENV"
          elif [ -n "${DEPLOY_PASSWORD_SECRET:-${SSH_PASSWORD_SECRET:-}}" ]; then
            echo "DEPLOY_AUTH_MODE=password" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_SSH_KEY or DEPLOY_PASSWORD/SSH_PASSWORD is required" >&2
            exit 1
          fi

      - name: Sync backend and database assets to server
        env:
          DEPLOY_PASSWORD_SECRET: ${{ secrets.DEPLOY_PASSWORD }}
          SSH_PASSWORD_SECRET: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail

          excludes=(
            --exclude='node_modules/'
            --exclude='dist/'
            --exclude='.env'
            --exclude='.env.local'
            --exclude='.env.*.local'
            --exclude='.env.production'
            --exclude='.env.staging'
            --exclude='*.log'
            --exclude='logs/'
            --exclude='coverage/'
            --exclude='*.tsbuildinfo'
            --exclude='certs/'
            --exclude='public/uploads/'
            --exclude='uploads/'
            --exclude='data/'
            --exclude='cache/'
            --exclude='storage/'
            --exclude='tmp/'
            --exclude='runtime/'
            --exclude='.git/'
            --exclude='.vscode/'
          )

          if [ "$DEPLOY_AUTH_MODE" = "key" ]; then
            ssh -i ~/.ssh/deploy_key \
              -p "$DEPLOY_PORT" \
              -o IdentitiesOnly=yes \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "mkdir -p '${DEPLOY_PATH}' '${DEPLOY_PATH}/database'"

            rsync -az --delete \
              -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} -o IdentitiesOnly=yes" \
              "${excludes[@]}" \
              backend/ \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

            rsync -az --delete \
              -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} -o IdentitiesOnly=yes" \
              "${excludes[@]}" \
              database/ \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/database/"
          else
            export SSHPASS="${DEPLOY_PASSWORD_SECRET:-${SSH_PASSWORD_SECRET:-}}"
            sshpass -e ssh \
              -p "$DEPLOY_PORT" \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "mkdir -p '${DEPLOY_PATH}' '${DEPLOY_PATH}/database'"

            sshpass -e rsync -az --delete \
              -e "ssh -p ${DEPLOY_PORT}" \
              "${excludes[@]}" \
              backend/ \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

            sshpass -e rsync -az --delete \
              -e "ssh -p ${DEPLOY_PORT}" \
              "${excludes[@]}" \
              database/ \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/database/"
          fi

      - name: Run optional restart command
        env:
          DEPLOY_RESTART_COMMAND: ${{ secrets.DEPLOY_RESTART_COMMAND }}
          DEPLOY_PASSWORD_SECRET: ${{ secrets.DEPLOY_PASSWORD }}
          SSH_PASSWORD_SECRET: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_RESTART_COMMAND:-}" ]; then
            echo "DEPLOY_RESTART_COMMAND is empty; synced files only."
            exit 0
          fi

          if [ "$DEPLOY_AUTH_MODE" = "key" ]; then
            printf '%s\n' "$DEPLOY_RESTART_COMMAND" | ssh \
              -i ~/.ssh/deploy_key \
              -p "$DEPLOY_PORT" \
              -o IdentitiesOnly=yes \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "cd '${DEPLOY_PATH}' && bash -s"
          else
            export SSHPASS="${DEPLOY_PASSWORD_SECRET:-${SSH_PASSWORD_SECRET:-}}"
            printf '%s\n' "$DEPLOY_RESTART_COMMAND" | sshpass -e ssh \
              -p "$DEPLOY_PORT" \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "cd '${DEPLOY_PATH}' && bash -s"
          fi

      - name: Verify deployed CORS preflight
        env:
          BACKEND_PUBLIC_ORIGIN: ${{ secrets.BACKEND_PUBLIC_ORIGIN }}
          ADMIN_PUBLIC_ORIGIN: ${{ secrets.ADMIN_PUBLIC_ORIGIN }}
        run: |
          set -euo pipefail

          if [ -z "${BACKEND_PUBLIC_ORIGIN:-}" ] || [ -z "${ADMIN_PUBLIC_ORIGIN:-}" ]; then
            echo "BACKEND_PUBLIC_ORIGIN or ADMIN_PUBLIC_ORIGIN is empty; skipping deployed CORS preflight check."
            exit 0
          fi

          node backend/scripts/verify-cors.mjs "$BACKEND_PUBLIC_ORIGIN" "$ADMIN_PUBLIC_ORIGIN"
