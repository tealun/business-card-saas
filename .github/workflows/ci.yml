name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  database:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./database
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./database/package-lock.json

      - run: npm ci

      - run: npm run rls:validate

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./backend/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test -- --coverage --coverageThreshold='{"global":{"branches":60,"functions":75,"lines":75,"statements":75}}'
