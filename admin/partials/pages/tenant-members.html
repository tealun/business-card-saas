<section class="page" data-page="tenant-members">
          <div class="page-head">
            <div><h2>成员与名片</h2><p>可使用本地邀请或企业微信同步添加成员。</p></div>
            <div class="row-actions"><button id="inviteMember" type="button" class="secondary">邀请员工</button><button id="createJoinCode" type="button" class="secondary">企业加入码</button><button id="syncMembers" type="button">同步企微</button></div>
          </div>
          <article class="panel">
            <div class="toolbar">
              <input id="memberSearch" placeholder="搜索姓名 / userid / open_userid" />
              <select id="memberStatusFilter">
                <option value="all">全部状态</option>
                <option value="active">已启用</option>
                <option value="disabled">已停用</option>
              </select>
              <button id="loadMembers" type="button" class="secondary">刷新</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>姓名</th>
                    <th>职位</th>
                    <th>部门</th>
                    <th>手机</th>
                    <th>邮箱</th>
                    <th>名片状态</th>
                    <th>最近访问</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="membersRows"><tr><td colspan="8">尚未加载</td></tr></tbody>
              </table>
            </div>
            <div class="table-footer"><span id="membersTotal">0 个成员</span></div>
          </article>
          <article class="panel">
            <div class="panel-head"><div><h3>加入申请</h3><p>公共企业码不会直接添加员工，必须由管理员审批。</p></div><button id="loadJoinRequests" class="secondary" type="button">刷新申请</button></div>
            <div id="joinCodeResult" class="join-code-preview">尚未生成企业加入二维码</div>
            <div class="table-wrap"><table><thead><tr><th>申请人</th><th>状态</th><th>申请时间</th><th>操作</th></tr></thead><tbody id="joinRequestRows"><tr><td colspan="4">尚未加载</td></tr></tbody></table></div>
          </article>
        </section>
