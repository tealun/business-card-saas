<section class="page" data-page="tenant-analytics">
          <div class="page-head">
            <div><h2>数据分析</h2><p>基于真实访问、互动和分享记录的企业级只读分析。</p></div>
            <button id="loadTenantAnalytics" type="button" class="secondary icon-btn">&#x21bb; 刷新</button>
          </div>
          <div class="metric-grid">
            <article class="metric"><span>访问总数</span><strong id="analyticsVisits">--</strong></article>
            <article class="metric"><span>独立访客</span><strong id="analyticsVisitors">--</strong></article>
            <article class="metric"><span>互动总数</span><strong id="analyticsActions">--</strong></article>
            <article class="metric"><span>分享次数</span><strong id="analyticsShares">--</strong></article>
          </div>
          <div class="content-grid two">
            <article class="panel">
              <div class="panel-head"><h3>互动漏斗</h3><span class="status-chip muted">全时段</span></div>
              <div id="analyticsFunnel" class="funnel"></div>
              <p class="hint funnel-note">口径：访问=名片浏览，互动=名片内行为，分享=转发次数</p>
            </article>
            <article class="panel">
              <div class="panel-head">
                <h3>访问趋势</h3>
                <div id="analyticsRange" class="segmented" role="group" aria-label="趋势窗口">
                  <button type="button" data-days="7" class="active">7 天</button>
                  <button type="button" data-days="30">30 天</button>
                </div>
              </div>
              <div id="analyticsTrend" class="callback-chart visit-chart"></div>
              <span class="chart-legend trend-legend"><i class="legend-dot visit"></i>访问<i class="legend-dot action"></i>互动</span>
            </article>
          </div>
          <article class="panel">
            <div class="panel-head"><h3>成员排行</h3><span class="status-chip muted">TOP 20 · 全时段</span></div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>排名</th><th>姓名</th><th>访问量</th><th>独立访客</th><th>互动</th></tr></thead>
                <tbody id="analyticsMemberRows"><tr><td colspan="5">尚未加载</td></tr></tbody>
              </table>
            </div>
          </article>
          <article class="panel hidden" id="analyticsActionPanel">
            <div class="panel-head"><h3>互动类型分布</h3></div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>类型</th><th>次数</th></tr></thead>
                <tbody id="analyticsActionRows"><tr><td colspan="2">尚未加载</td></tr></tbody>
              </table>
            </div>
          </article>
        </section>
