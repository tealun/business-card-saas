<section class="page" data-page="platform-tenants">
          <div class="page-head">
            <div><h2>企业授权中心</h2><p>查看企业安装、授权健康和成员名片规模；本地企业可在此新建与管理。</p></div>
            <div class="page-head-actions">
              <button id="createLocalEnterprise" type="button">新建本地企业</button>
              <button id="loadTenantAuthorizations" type="button" class="secondary icon-btn" aria-label="刷新">&#x21bb; 刷新</button>
            </div>
          </div>
          <article class="panel" id="createLocalEnterprisePanel" hidden>
            <div class="toolbar">
              <input id="localEnterpriseCreateName" placeholder="企业名称（2-255 字）" maxlength="255" />
              <input id="localEnterpriseCreateMemberLimit" type="number" min="1" placeholder="授权人数（留空=不限）" />
              <button id="submitCreateLocalEnterprise" type="button">创建并生成二维码</button>
              <button id="cancelCreateLocalEnterprise" type="button" class="secondary">取消</button>
            </div>
            <p class="hint">本地企业不绑定企业微信，默认不限制授权人数；如后期升级为企业微信模式，可按缴费席位填写人数上限。创建后会弹出认领二维码，企业负责人扫码后在小程序完成认领并成为管理员。</p>
          </article>
          <article class="panel">
            <div class="toolbar">
              <input id="tenantAuthorizationSearch" placeholder="搜索企业名称或 OpenCorpID" />
              <select id="tenantAuthorizationStatus">
                <option value="all">全部状态</option>
                <option value="active">授权有效</option>
                <option value="cancelled">已取消授权</option>
              </select>
              <button id="searchTenantAuthorizations" type="button">搜索</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>企业名称</th><th>OpenCorpID</th><th>授权状态</th><th>授权健康</th><th>成员</th><th>名片</th><th>安装时间</th><th>操作</th></tr></thead>
                <tbody id="tenantAuthorizationRows"><tr><td colspan="8">尚未加载</td></tr></tbody>
              </table>
            </div>
            <div class="table-footer">
              <button id="tenantAuthorizationPrev" type="button" class="secondary">上一页</button>
              <span id="tenantAuthorizationPage">第 1 页</span>
              <button id="tenantAuthorizationNext" type="button" class="secondary">下一页</button>
              <strong id="tenantAuthorizationTotal">0 家企业</strong>
            </div>
          </article>
        </section>
