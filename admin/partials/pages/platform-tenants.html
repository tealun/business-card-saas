<section class="page" data-page="platform-tenants">
          <div class="page-head">
            <div><h2>企业授权中心</h2><p>查看企业安装、授权健康和成员名片规模。</p></div>
            <button id="loadTenantAuthorizations" type="button" class="secondary icon-btn" aria-label="刷新">&#x21bb; 刷新</button>
          </div>
          <article class="panel">
            <div class="toolbar">
              <input id="tenantAuthorizationSearch" placeholder="搜索企业名称或 OpenCorpID" />
              <select id="tenantAuthorizationStatus">
                <option value="all">全部状态</option>
                <option value="active">授权有效</option>
                <option value="cancelled">已取消授权</option>
              </select>
              <button id="searchTenantAuthorizations" type="button">搜索</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>企业名称</th><th>OpenCorpID</th><th>授权状态</th><th>授权健康</th><th>成员</th><th>名片</th><th>安装时间</th><th>操作</th></tr></thead>
                <tbody id="tenantAuthorizationRows"><tr><td colspan="8">尚未加载</td></tr></tbody>
              </table>
            </div>
            <div class="table-footer">
              <button id="tenantAuthorizationPrev" type="button" class="secondary">上一页</button>
              <span id="tenantAuthorizationPage">第 1 页</span>
              <button id="tenantAuthorizationNext" type="button" class="secondary">下一页</button>
              <strong id="tenantAuthorizationTotal">0 家企业</strong>
            </div>
          </article>
        </section>
