<section class="page" data-page="platform-features">
          <div class="page-head">
            <div><h2>功能开关</h2><p>平台默认与企业级视频能力 override。</p></div>
            <div class="page-head-actions">
              <button id="loadVideoFeatures" type="button" class="secondary">刷新</button>
              <button id="saveVideoFeatures" type="button">保存平台设置</button>
            </div>
          </div>
          <article class="panel">
            <div class="table-wrap">
              <table>
                <thead><tr><th>功能</th><th>平台默认</th><th>企业 override</th><th>默认上限</th><th>说明</th></tr></thead>
                <tbody>
                  <tr>
                    <td><strong>企业视频</strong><br><code>company-video</code></td>
                    <td><label class="switch"><input id="platformVideoEnabled" type="checkbox" /><span class="switch-track"></span></label></td>
                    <td><strong id="platformVideoOverrideCount">--</strong> 家</td>
                    <td><span class="limit-field"><input id="platformVideoLimit" type="number" min="1" max="1024" value="500" /> MB</span></td>
                    <td class="muted-cell">企业主页与名片可上传展示视频</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </article>
          <article class="panel">
            <div class="panel-head"><h3>已授权企业</h3><span id="tenantFeatureOverrideTotal" class="status-chip muted">-- 家</span></div>
            <div id="tenantFeatureEditor" class="editor-stack"></div>
          </article>
          <article class="panel">
            <div class="panel-head"><h3>查询企业并授权</h3><p>查询目标企业后单独开通企业视频能力。</p></div>
            <div class="toolbar"><input id="tenantFeatureSearch" placeholder="输入企业名称" /><button id="searchTenantFeatures" type="button">查询企业</button></div>
            <div id="tenantFeatureSearchResults" class="editor-stack feature-search-results"><p class="hint">请输入企业名称后查询。</p></div>
          </article>
        </section>
